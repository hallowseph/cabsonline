<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CabsOnline - Admin</title>
        <link rel="stylesheet" href="booking.css">
    </head>
    <body>
        <h1>CabsOnline - Admin</h1>

        <p>
            <label for="bsearch">Booking Reference Number: </label>
            <input type="text" name="bsearch" id="bsearch" placeholder="e.g. BRN00001" />
            <input type="button" name="sbutton" id="sbutton" value="Search" onclick="searchBooking()" />
        </p>

        <div id="results"></div>

        <div id="confirmation"></div>

        <script src="admin.js"></script>
    </body>
